name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-compile:
    name: Syntax & import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system deps for psycopg2
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libpq-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Byte-compile all sources
        run: python -m compileall -q app alembic tasks scripts

      - name: Import smoke test
        env:
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/postgres"
          SYNC_DATABASE_URL: "postgresql+psycopg2://postgres:postgres@localhost:5432/postgres"
          DATABASE_SSL: "false"
        run: python -c "import app.main; import app.database; import app.models; print('imports ok')"

  alembic-migrate:
    name: Alembic upgrade head
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cloudcost
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/cloudcost"
      SYNC_DATABASE_URL: "postgresql+psycopg2://postgres:postgres@localhost:5432/cloudcost"
      DATABASE_SSL: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libpq-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write CI alembic.ini (override hardcoded prod URL)
        run: |
          cat > alembic.ci.ini <<'EOF'
          [alembic]
          script_location = alembic
          sqlalchemy.url = postgresql+psycopg2://postgres:postgres@localhost:5432/cloudcost

          [loggers]
          keys = root,sqlalchemy,alembic

          [handlers]
          keys = console

          [formatters]
          keys = generic

          [logger_root]
          level = WARN
          handlers = console
          qualname =

          [logger_sqlalchemy]
          level = WARN
          handlers =
          qualname = sqlalchemy.engine

          [logger_alembic]
          level = INFO
          handlers =
          qualname = alembic

          [handler_console]
          class = StreamHandler
          args = (sys.stderr,)
          level = NOTSET
          formatter = generic

          [formatter_generic]
          format = %(levelname)-5.5s [%(name)s] %(message)s
          datefmt = %H:%M:%S
          EOF

      - name: Validate migration graph
        run: alembic -c alembic.ci.ini heads

      - name: Apply migrations to empty DB
        run: alembic -c alembic.ci.ini upgrade head

      - name: Check for un-generated schema diffs
        run: |
          alembic -c alembic.ci.ini revision --autogenerate -m "ci_drift_check" --rev-id ci_drift || true
          drift_file=$(ls alembic/versions/ci_drift_*.py 2>/dev/null | head -n1 || true)
          if [ -z "$drift_file" ]; then
            echo "No drift revision produced — autogenerate did not detect a diff."
            exit 0
          fi
          # If the generated revision has a non-empty upgrade() body, fail.
          if grep -qE "^\s{4}(op\.|pass)\s*$" "$drift_file"; then
            if grep -qE "^\s{4}op\." "$drift_file"; then
              echo "::error::Models drift detected — alembic autogenerate produced schema changes. Run 'alembic revision --autogenerate' locally and commit."
              cat "$drift_file"
              rm -f "$drift_file"
              exit 1
            fi
          fi
          rm -f "$drift_file"

  tests:
    name: pytest (best-effort)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libpq-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests (skip if empty)
        env:
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/postgres"
          SYNC_DATABASE_URL: "postgresql+psycopg2://postgres:postgres@localhost:5432/postgres"
          DATABASE_SSL: "false"
        run: |
          if find tests -name "test_*.py" -o -name "*_test.py" 2>/dev/null | grep -q .; then
            pytest -q
          else
            echo "No test files yet — skipping. Add tests under tests/ to enable this job."
          fi
