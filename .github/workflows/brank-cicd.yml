name: brank-cicd

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: cloudcostacr20260409
  ACR_LOGIN_SERVER: cloudcostacr20260409.azurecr.io
  IMAGE_REPO: cloudcost
  CONTAINER_APP: cloudcost-brank
  RESOURCE_GROUP: CloudCost

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "$ACR_NAME"

      - name: Compute image tag
        id: tag
        run: echo "tag=$(date +%Y%m%d)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        run: |
          IMAGE="${ACR_LOGIN_SERVER}/${IMAGE_REPO}:${{ steps.tag.outputs.tag }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Update Container App (all containers)
        run: |
          for C in api celery-worker celery-beat; do
            az containerapp update \
              --name "$CONTAINER_APP" \
              --resource-group "$RESOURCE_GROUP" \
              --container-name "$C" \
              --image "$IMAGE"
          done
